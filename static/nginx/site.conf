server {
  listen 80;
  listen [::]:80;
  #listen [::]:80 default_server ipv6only=on;
  server_name $DOMAIN;




  # Path to static files
  root   /var/www/html/pathfinder/;
  index index.php index.html index.htm;

  # Specify a charset
  charset utf-8;

  # Security response headers (applied to HTML/app responses served via 'location /').
  # NOTE: nginx add_header does NOT merge into child locations that declare their own
  # add_header (e.g. /js/, css); those static assets intentionally keep cache headers only.
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;


  # Logging ===================================================================================================================
  error_log  /var/log/nginx/error.log warn;
  # 관측성: 타이밍 필드 포함 포맷 + 전체 상태코드 (진단용 — nginx.conf의 main_ext 정의 참고)
  access_log /var/log/nginx/access.log main_ext;

  # Observability: /metrics는 내부 전용 vhost(:8081)에서만 접근 가능.
  # 이 블록이 없으면 Traefik(:80)을 통해 외부에서 앱 메트릭이 노출된다.
  location = /metrics {
    return 404;
  }

  # Security: gate the setup surface behind basic auth.
  # F3 routes case-INSENSITIVELY, so /Setup, /SETUP etc. must be covered ('~*').
  # Also covers /api/setup/* (cronExecute/buildIndex/clearIndex) which is reachable
  # unauthenticated via the /api/@controller/@action wildcard, independent of routes.ini.
  location ~* ^/(setup|api/setup) {
   auth_basic "Setup Login";
   auth_basic_user_file /etc/nginx/.setup_pass;
   try_files $uri $uri/ /index.php?q=$uri&$args;
  }

   location / {
            # First attempt to serve request as file, then
            # as directory, then fall back to index.php
            try_files $uri $uri/ /index.php?q=$uri&$args;
        }

        # redirect server error pages to the static page /50x.html
        #
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /var/lib/nginx/html;
        }

        # pass the PHP scripts to FastCGI server listening on 127.0.0.1:9000
        # Security: ONLY index.php is a web entry point. This blocks direct execution of
        # standalone-daemon.php (CLI-only; web access = unauthenticated infinite-loop DoS)
        # and any other *.php dropped into the docroot.
        location ~ ^/index\.php$ {
            try_files $uri =404;
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            fastcgi_pass  127.0.0.1:9000;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param SCRIPT_NAME $fastcgi_script_name;
            fastcgi_index index.php;
            include fastcgi_params;
        }

        # Security: every OTHER *.php in the docroot must neither execute nor be served
        # as raw source. Without this, a direct request to /standalone-daemon.php falls
        # through to 'location /' and nginx returns the file as static source (HTTP 200).
        # index.php still executes because '^/index\.php$' above matches first.
        location ~ \.php$ {
            deny all;
        }

        location ^~ /js/ {
            expires off;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
        }

        location ~* \.(jpg|jpeg|gif|png|ico|xml)$ {
            expires 5d;
        }

        location ~* \.css$ {
            expires off;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
            add_header Pragma "no-cache" always;
        }

	# hotfix for info disclosure
        location ~* \.(ini)$ {
            log_not_found off;
            deny all;
        }
        location ~* \.(log)$ {
            log_not_found off;
            deny all;
        }

        # deny access to . files, for security
        #
        location ~ /\. {
            log_not_found off;
            deny all;
     }

 location /ws/map/update {
    set $ws_backend "${PATHFINDER_SOCKET_HOST}:8020";
    proxy_pass http://$ws_backend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;

    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_read_timeout 8h;
    proxy_send_timeout 5s;
    proxy_connect_timeout 3s;
    proxy_buffering off;
  }
  # static sources
  location /public/ {
    sendfile                                    on;
    tcp_nopush                                  on;
    tcp_nodelay                                 on;
    keepalive_timeout                           10s;
    sendfile_max_chunk                          512k;
  }

}

# Observability vhost (internal only) =========================================================================
# Traefik은 서비스 포트 80으로만 라우팅하므로(:8081은 docker network 내부 전용),
# 이 블록의 엔드포인트들은 Alloy 등 같은 네트워크의 수집기만 접근할 수 있다.
server {
  listen 8081;
  server_name _;

  # 스크레이프 트래픽은 액세스 로그에서 제외 (노이즈 방지)
  access_log off;

  root /var/www/html/pathfinder/;

  # nginx 자체 상태 (MetricsController가 파싱해 pf_nginx_* 로 노출)
  location = /nginx_status {
    stub_status;
  }

  # php-fpm 풀 상태 (pm.status_path = /fpm-status, MetricsController가 파싱해 pf_phpfpm_* 로 노출)
  location = /fpm-status {
    include fastcgi_params;
    fastcgi_pass 127.0.0.1:9000;
    fastcgi_param SCRIPT_NAME /fpm-status;
    fastcgi_param SCRIPT_FILENAME /fpm-status;
  }

  # 앱 메트릭 (F3 → MetricsController) — Prometheus text format 통합 엔드포인트
  location = /metrics {
    include fastcgi_params;
    fastcgi_pass 127.0.0.1:9000;
    fastcgi_param SCRIPT_FILENAME $document_root/index.php;
    fastcgi_param SCRIPT_NAME /index.php;
  }

  location / {
    return 404;
  }
}
