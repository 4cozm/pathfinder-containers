memory_limit = 128M
max_execution_time = 60
upload_max_filesize = 100M
post_max_size = 108M
max_input_vars = 5000
html_errors = 0
cgi.force_redirect=0
; Security: disable path-info fixup (prevents /foo.jpg/x.php style PHP exec tricks)
cgi.fix_pathinfo=0
fastcgi.impersonate=1
fastcgi.logging=0
session.save_handler = redis
session.save_path = "tcp://${REDIS_HOST}:${REDIS_PORT}?lock_expire=30&lock_wait_time=50000&lock_retries=300"
session.gc_maxlifetime = 7200
; Security: harden session cookie. cookie_secure requires HTTPS at the edge
; (Traefik terminates TLS and redirects HTTP->HTTPS, so this holds in deployment).
session.cookie_httponly = 1
session.cookie_secure = 1
session.cookie_samesite = "Lax"
[Date]
date.timezone="UTC"

[opcache]
; PHP 코드 변경 시 즉시 반영: 매 요청마다 파일 변경 여부 확인 (0 = 항상 재검증)
opcache.revalidate_freq=0
; 파일 타임스탬프 검증 활성화
opcache.validate_timestamps=1

