[global]
; Log to stderr
error_log = /dev/stderr

[www]
user = nobody
group = nobody

; nginx의 fastcgi_pass(127.0.0.1:9000)와 일치시킨다. 베이스 이미지 기본 www.conf를 제거해
; [www] 풀 중복을 없애므로(워커가 두 풀에서 떠 max_children를 우회하던 문제), 이 풀이 직접
; listen을 지정해야 php-fpm이 정상 기동한다.
listen = 127.0.0.1:9000

; Enable status page
pm.status_path = /fpm-status

; Dynamic process manager.
; ondemand는 idle 10s 후 워커를 전부 죽여 다음 요청마다 콜드스타트(F3 부트+Redis+DB)를
; 물린다. 4GB/2C 박스에서 pf 컨테이너 mem_limit를 1200MB로 올렸고 실사용은 그보다 한참
; 작아서, 상시 warm spare를 띄우는 dynamic이 안전하면서 체감 지연을 없앤다. max_children를
; 천장(메모리 안전선)으로 두고 그 안에서 부하에 따라 자동으로 늘었다 줄었다 한다.
pm = dynamic

; 동시 처리 요청 상한 = 메모리 천장. 2GB 시절 10이었는데 max_children(10) 포화 경고가
; 하루 수십 번 찍혀 요청이 큐에 밀리던(= 유실되던) 문제가 있었다. ESI/DB 같은 I/O 대기로
; 워커가 슬롯을 점유하는 패턴이라 동시성을 올리면 직접 해소된다. 워커 RSS ~30-40MB라
; 20개여도 1200MB 안에 nginx+opcache 포함 충분히 들어간다. (코어는 여전히 2개라 CPU
; 바운드 구간 이득은 제한적이지만 병목은 I/O 대기였음.)
pm.max_children = 20

; 부팅 직후 미리 띄워둘 워커 수 (= min_spare + 약간).
pm.start_servers = 4

; 항상 대기시켜 둘 유휴 워커의 최소/최대치. min_spare 덕분에 평상시 콜드스타트가 사라지고,
; 한가해지면 max_spare까지 자동으로 줄여 메모리를 돌려준다. 이게 요청하신 "안전 범위 내
; 어댑티브"의 내장 구현이다.
pm.min_spare_servers = 3
pm.max_spare_servers = 8

; The number of requests each child process should execute before respawning.
; This can be useful to work around memory leaks in 3rd party libraries. For
; endless request processing specify '0'. Equivalent to PHP_FCGI_MAX_REQUESTS.
; 메모리 여유가 늘어 respawn 콜드스타트 빈도를 줄이려 300 → 500.
pm.max_requests = 500

; The timeout for serving a single request after which the worker process will
; be killed. This option should be used when the 'max_execution_time' ini option
; does not stop script execution for some reason.
; Default Value: 0
request_terminate_timeout = 60s

; 관측성: 5초 이상 걸린 요청의 PHP 스택트레이스를 남긴다 (어느 코드에서 멈췄는지 즉시 특정).
; 경로는 앱 로그 bind mount(./logs/app) 아래라 Alloy가 그대로 Loki로 수집한다.
request_slowlog_timeout = 5s
slowlog = /var/www/html/pathfinder/logs/php_slow.log

; Make sure the FPM workers can reach the environment variables for configuration
clear_env = no

; Catch output from PHP
catch_workers_output = yes
