[global]
; Log to stderr
error_log = /dev/stderr

[www]
user = nobody
group = nobody

; nginx의 fastcgi_pass(127.0.0.1:9000)와 일치시킨다. 베이스 이미지 기본 www.conf를 제거해
; [www] 풀 중복을 없애므로(워커가 두 풀에서 떠 max_children를 우회하던 문제), 이 풀이 직접
; listen을 지정해야 php-fpm이 정상 기동한다.
listen = 127.0.0.1:9000

; Enable status page
pm.status_path = /fpm-status

; Dynamic process manager.
; ondemand는 idle 10s 후 워커를 전부 죽여 다음 요청마다 콜드스타트(F3 부트+Redis+DB)를
; 물린다. 4GB/2C 박스에서 pf 컨테이너 mem_limit를 1200MB로 올렸고 실사용은 그보다 한참
; 작아서, 상시 warm spare를 띄우는 dynamic이 안전하면서 체감 지연을 없앤다. max_children를
; 천장(메모리 안전선)으로 두고 그 안에서 부하에 따라 자동으로 늘었다 줄었다 한다.
pm = dynamic

; 동시 처리 요청 상한 = 메모리 천장. 2GB 시절 10 → 20 → 32.
;
; 20에서도 max_children 포화가 7/22 46회, 7/23 93회 페이스로 오히려 늘었다. 다만
; total_processes p50=8 / p99=18 / max=20 이라 상시 포화가 아니라 짧은 버스트가
; 천장을 치고 지나가는 패턴이고, 그 순간 요청은 listen_queue(실측 max 12)에 밀린다.
;
; 메모리 근거 (7/21 15:40 배포 후 47시간 무재시작, n=2804 스냅샷):
;   working set p50 160MB / p99 245MB / max 326MB, 한도 1200MB → 여유 874MB
;   워커 1개당 한계비용은 RSS(29~36MB)가 아니라 private_dirty 12~19MB(평균 ~14MB).
;   RSS 대부분은 opcache/바이너리 공유분이라 워커 수에 비례하지 않는다.
;   32면 최악 +180MB(326 → 506MB)로 한도의 42%. 호스트도 available 2560MB,
;   memory PSI some/full 전 구간 0.00 이라 압박 없음.
;
; 코어는 여전히 2개다. 상시 CPU 포화라면 동시성을 올려도 처리량이 아니라 큐잉만
; 늘지만(2026-07-21 pm=static 시도가 이 이유로 철회됐다), 실측 CPU idle 82~88% /
; CPU PSI some avg300 7.5% 라 지속 포화가 아니라 버스트다. 그래서 32까지만 올린다.
;
; 되돌리는 기준: max_children_reached 가 안 줄거나, rest/System 지연 꼬리(5s+/10s+)가
; 늘거나, CPU PSI some avg300 이 20%+ 로 오르면 20으로 복귀.
; (평균 지연은 보지 말 것 — 스로틀/스킵이 있는 시스템에서 평균은 거짓말한다)
pm.max_children = 32

; 부팅 직후 미리 띄워둘 워커 수 (= min_spare + 약간).
pm.start_servers = 4

; 항상 대기시켜 둘 유휴 워커의 최소/최대치. min_spare 덕분에 평상시 콜드스타트가 사라지고,
; 한가해지면 max_spare까지 자동으로 줄여 메모리를 돌려준다. 이게 요청하신 "안전 범위 내
; 어댑티브"의 내장 구현이다.
pm.min_spare_servers = 3
pm.max_spare_servers = 8

; The number of requests each child process should execute before respawning.
; This can be useful to work around memory leaks in 3rd party libraries. For
; endless request processing specify '0'. Equivalent to PHP_FCGI_MAX_REQUESTS.
; 메모리 여유가 늘어 respawn 콜드스타트 빈도를 줄이려 300 → 500.
pm.max_requests = 500

; The timeout for serving a single request after which the worker process will
; be killed. This option should be used when the 'max_execution_time' ini option
; does not stop script execution for some reason.
; Default Value: 0
;
; nginx의 fastcgi_read_timeout(40s, static/nginx/nginx.conf:90)보다 **낮아야** 한다.
; 60s였을 때는 nginx가 40초에 504를 내고 커넥션을 끊은 뒤에도 워커가 20초를 더
; 붙들고 있었다 — 아무도 읽지 않을 응답을 만드느라 슬롯을 낭비하는 것이고,
; 하필 풀이 고갈된 그 순간에 낭비된다.
;
; 실측상 현재 빈도는 낮다 (504는 4/3~7/21 누적 130건, 그중 7월은 4건). 즉 지금
; 당장 아픈 문제가 아니라, 포화가 심해질 때 증폭기로 작동하는 잠복 설정이다.
; max_execution_time(php.ini)은 60인데, 이건 블로킹 I/O 대기를 세지 않으므로
; I/O로 멈춘 요청에는 이 값만이 유일한 백스톱이다.
request_terminate_timeout = 35s

; 관측성: 5초 이상 걸린 요청의 PHP 스택트레이스를 남긴다 (어느 코드에서 멈췄는지 즉시 특정).
; 경로는 앱 로그 bind mount(./logs/app) 아래라 Alloy가 그대로 Loki로 수집한다.
request_slowlog_timeout = 5s
slowlog = /var/www/html/pathfinder/logs/php_slow.log

; Make sure the FPM workers can reach the environment variables for configuration
clear_env = no

; Catch output from PHP
catch_workers_output = yes
