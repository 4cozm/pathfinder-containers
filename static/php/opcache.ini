; Zend OPcache — 업스트림 이미지에 아예 빠져 있어 요청마다 전체 PHP 파일을 재컴파일하던
; 문제 수정 (slowlog 스냅샷의 19%가 Composer 오토로더/컴파일에서 포착됨).
; 프레임워크 헤비(F3+Cortex+Guzzle) 앱이라 효과가 큼.
opcache.enable = 1
; CLI(pf-daemon, cron)는 프로세스 수명이 길거나 짧아 이득이 적고 메모리만 씀
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000
; 소스는 이미지에 구워져 불변이지만, F3 템플릿 컴파일 산출물(tmp/)이 런타임에 생성되므로
; 완전 비활성(=0) 대신 60초 재검증으로 안전 마진을 둔다 (오버헤드는 stat 캐시 수준)
opcache.validate_timestamps = 1
opcache.revalidate_freq = 60
