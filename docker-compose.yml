services:
  pfdb:
    image: bianjp/mariadb-alpine:latest
    mem_limit: 900m
    environment:
      MYSQL_ROOT_PASSWORD: $MYSQL_PASSWORD
    networks:
      pf:
        aliases:
          - "$MYSQL_HOST"
    labels:
      # unhealthy 가 되면 autoheal 이 이 컨테이너를 재시작한다.
      - "autoheal=true"
    healthcheck:
      # 이 검사는 엄밀히 말해 좋은 검사가 아니다. mysqladmin ping 은 인증에 실패해도
      # exit 0 을 주므로 "접속 가능"이 아니라 "5초 안에 응답"만 검증한다. 게다가
      # 자격증명이 없어 서버 에러 로그에 Access denied 를 쌓는다.
      #
      # 그럼에도 그대로 두는 이유: 2026-07-23 장애(mysqld 세그폴트 후 hang)를 이
      # 검사가 287회 연속 실패로 정확히 탐지해냈다. autoheal 이 필요로 하는 신호는
      # 그것으로 충분하다.
      #
      # 실제 쿼리(`mysql -h 127.0.0.1 -e 'SELECT 1'`)로 바꿔봤으나 이 이미지의
      # 컨테이너는 루프백 인터페이스(lo)가 UP 상태가 아니라 127.0.0.1 이 ETIMEDOUT(110)
      # 으로 죽고, unix 소켓 폴백도 실패한다. 검사를 강화하려면 lo 문제부터 풀어야 한다.
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      # 크래시 복구(InnoDB) 중에는 아직 질의를 못 받는다. 기동 구간의 실패를
      # 재시작 사유로 세지 않도록 유예를 둔다.
      start_period: 60s
    volumes:
      - db_data:/var/lib/mysql
      - ./pathfinder/export/sql/eve_universe.sql.zip:/eve_universe.sql.zip
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    restart: always
  pf-migrate-standalone:
    image: bianjp/mariadb-alpine:latest
    mem_limit: 384m
    env_file:
      - .env
    environment:
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_PF_DB_NAME: ${MYSQL_PF_DB_NAME:-pathfinder}
    volumes:
      - ./pathfinder/export/sql/standalone_detect_characters.sql:/sql/standalone_detect_characters.sql:ro
      - ./pathfinder/export/sql/standalone_detect_log.sql:/sql/standalone_detect_log.sql:ro
      - ./scripts/migrate-standalone-detect.sh:/migrate.sh:ro
    entrypoint: ["sh", "/migrate.sh"]
    depends_on:
      pfdb:
        condition: service_healthy
    restart: "no"
    networks:
      - pf

  pf-redis:
    image: redis:6.2.5-alpine3.14
    mem_limit: 320m
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "volatile-lru"]
    container_name: redis
    volumes:
      - redis_data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    networks:
      pf:
        aliases:
          - "$REDIS_HOST"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: always
  pf-socket:
    container_name: pf-socket
    mem_limit: 200m
    build:
      context: .
      dockerfile: Dockerfile.websocket
    image: pf-websocket:local
    env_file:
      - .env
    command: ["--tcpHost", "0.0.0.0"]
    networks:
      pf:
        aliases:
          - "$PATHFINDER_SOCKET_HOST"
    volumes:
      - pf_tmp:/var/www/html/pathfinder/tmp
      - ./logs:/var/www/html/pathfinder/history/map
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    restart: always
  pf:
    container_name: pathfinder
    mem_limit: 1200m
    build: .
    image: pathfinder:local
    # php-fpm slowlog(request_slowlog_timeout)가 워커 백트레이스를 뜨려면 ptrace가
    # 필요한데 Docker 기본 seccomp이 차단함 → "failed to ptrace(ATTACH)" 에러.
    # 진단용 최소 권한으로 SYS_PTRACE만 허용 (컨테이너 자기 자신의 fpm 워커 대상).
    cap_add:
      - SYS_PTRACE
    env_file:
      - .env
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"
      - "traefik.http.routers.pf.service=pf"
      - "traefik.http.services.pf.loadbalancer.server.port=80"
      - "traefik.http.routers.pf.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.pf.entrypoints=web"
      - "traefik.http.routers.pf-secure.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.pf-secure.service=pf"
      - "traefik.http.routers.pf-secure.entrypoints=websecure"
      - "traefik.http.routers.pf-secure.tls=true"
      - "traefik.http.routers.pf-secure.tls.certresolver=letsencrypt"
      - "traefik.http.middlewares.redirecthttps.redirectscheme.scheme=https"
      - "traefik.http.routers.pf.middlewares=redirecthttps"
    networks:
      - pf
      - web
    healthcheck:
      disable: true
    volumes:
      - pf_tmp:/var/www/html/pathfinder/tmp
      - ./config/pathfinder/config.ini:/var/www/html/pathfinder/app/templateConfig.ini
      - ./config/pathfinder/pathfinder.ini:/var/www/html/pathfinder/app/pathfinder.ini
      - ./config/pathfinder/plugin.ini:/var/www/html/pathfinder/app/plugin.ini
      - ./config/pathfinder/environment.ini:/var/www/html/pathfinder/app/templateEnvironment.ini:ro
      - ./logs:/var/www/html/pathfinder/history/map
      - ./logs/app:/var/www/html/pathfinder/logs
      - ./logs/nginx:/var/log/nginx
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      pfdb:
        condition: service_healthy
      pf-redis:
        condition: service_started
      pf-socket:
        condition: service_started
    restart: always
  pf-daemon:
    container_name: pathfinder-daemon
    mem_limit: 300m
    build: .
    image: pathfinder:local
    env_file:
      - .env
    networks:
      - pf
    healthcheck:
      # 데몬은 "죽지 않고 일만 멈추는" 실패가 기본값이다. 2026-07-23 DB 장애 때
      # 14:31:36 이후 로그 한 줄 없이 조용히 멈춰 있었고, 그걸 알아챈 장치가 없었다.
      #
      # standalone-daemon.php 는 성공한 틱에서만 /tmp/daemon-heartbeat 에 epoch 를
      # 쓴다. 그래서 이 검사는 두 실패 모드를 모두 잡는다:
      #   (a) DB hang    → 루프가 블록되어 하트비트 정지
      #   (b) DB 재시작  → 커넥션이 죽은 채 예외만 반복(루프는 계속 돎) → 틱이 성공하지
      #                    않으므로 하트비트 정지. 데몬은 시작 시 한 번만 커넥션을 잡고
      #                    재연결하지 않으므로 이 모드는 재시작 없이는 영구히 안 낫는다
      #
      # 임계값 산정: 틱 주기 10s, 실측 틱 소요 2.4~3.8s. 120s = 12틱 연속 실패에
      # 해당하고, 여기에 retries 3 × interval 30s 가 더 붙어 실제 unhealthy 판정까지
      # 약 3분 30초다. 82분 방치보다 두 자릿수 빠르면서, 일시적 지연을 재시작 사유로
      # 오인하지 않을 만큼은 넉넉하다. (7/23 에 mysqladmin ping 을 실쿼리로 바꿨다가
      # 멀쩡한 DB 를 unhealthy 로 오판해 되돌린 전례 때문에 의도적으로 느슨하게 잡았다)
      test: ['CMD-SHELL', 'hb=$$(cat /tmp/daemon-heartbeat 2>/dev/null); [ -n "$$hb" ] && [ $$(( $$(date +%s) - hb )) -lt 120 ]']
      interval: 30s
      timeout: 5s
      retries: 3
      # 부팅 후 첫 성공 틱까지는 하트비트 파일이 없다. F3 부트 + DB 접속 + 첫 틱을
      # 여유 있게 덮는다.
      start_period: 90s
    volumes:
      - pf_tmp:/var/www/html/pathfinder/tmp
      - ./pathfinder/standalone-daemon.php:/var/www/html/pathfinder/standalone-daemon.php:ro
      - ./config/pathfinder/config.ini:/var/www/html/pathfinder/app/templateConfig.ini:ro
      - ./config/pathfinder/pathfinder.ini:/var/www/html/pathfinder/app/pathfinder.ini
      - ./config/pathfinder/plugin.ini:/var/www/html/pathfinder/app/plugin.ini
      - ./config/pathfinder/environment.ini:/var/www/html/pathfinder/app/templateEnvironment.ini:ro
      - ./logs:/var/www/html/pathfinder/history/map
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      pfdb:
        condition: service_healthy
      pf-redis:
        condition: service_started
      pf-socket:
        condition: service_started
    restart: always
    working_dir: /var/www/html/pathfinder
    command: ["php", "/var/www/html/pathfinder/standalone-daemon.php", "10"]

  traefik:
    image: traefik:v2.11
    container_name: traefik
    mem_limit: 100m
    command:
      - "--log.level=ERROR"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      # Remove below line when ready for production
      - "--certificatesresolvers.letsencrypt.acme.email=${LE_EMAIL}"
    ports:
      - "80:80"
      - "443:443"
      # Security: Traefik dashboard/API (--api.insecure=true) bound to loopback only,
      # not exposed to the internet. Reach it via an SSH tunnel to 127.0.0.1:8080.
      - "127.0.0.1:8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./letsencrypt:/letsencrypt
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    networks:
      - web
    restart: always

  pf-cron:
    image: docker:cli
    container_name: pathfinder-cron
    mem_limit: 64m
    networks:
      - pf
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./backup_db.sh:/backup_db.sh
      - .:/backup_dir
    environment:
      - TZ=Asia/Seoul
    entrypoint: >
      sh -c "
      echo '0 6 * * * cd /backup_dir && sh /backup_db.sh >> /backup_dir/backup.log 2>&1' > /etc/crontabs/root &&
      crond -f -d 8"
    restart: always

  # 2026-07-23, mysqld 가 세그폴트 후 죽지 않고 멈춘 채로 82분간 서비스를 전면
  # 중단시켰다. `restart: always` 는 컨테이너가 exit 해야 발동하고, mysqld_safe 도
  # 자식 프로세스가 살아 있으면 재시작하지 않는다. 헬스체크는 287회 연속 unhealthy
  # 를 보고했지만 그것을 읽고 조치하는 주체가 없었다.
  # 즉 "죽는 장애"는 기존 장치로 복구되지만 "살아서 멈추는 장애"는 아무도 못 잡는다.
  # autoheal 이 그 빈칸을 메운다: unhealthy 상태가 지속되면 컨테이너를 재시작한다.
  autoheal:
    image: willfarrell/autoheal:1.2.0
    container_name: autoheal
    mem_limit: 64m
    environment:
      # 라벨을 붙인 컨테이너만 감시한다(전체 자동 재시작은 위험하다).
      AUTOHEAL_CONTAINER_LABEL: autoheal
      AUTOHEAL_INTERVAL: 10
      AUTOHEAL_START_PERIOD: 60
      # 멈춘 mysqld 는 SIGTERM 을 30초 내내 무시했다(위 장애에서 실측). 그 뒤 SIGKILL.
      # InnoDB 크래시 복구는 약 1초로 값이 싸므로, 클린 종료를 오래 기다릴 이유가 없다.
      AUTOHEAL_DEFAULT_STOP_TIMEOUT: 30
      TZ: Asia/Seoul
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: always

volumes:
  db_data:
  redis_data:
  pf_tmp:
  standalone_ticket:
networks:
  pf:
  web:
    external: true
